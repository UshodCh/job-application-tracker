<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
		.lo{
		position:absolute;
		top:20px;
		right:20px;
		text-decoration:none;
		padding:8px 15px;
		background-color:#3498db;
		color:white;
		border-radius:5px; }
}
    </style>
	
</head>
<body>
	<a href="/logout/" class="lo">Logout</a>
    <h1>My Profile 👤</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Profile</button>
    </form>
</body>
</html>
